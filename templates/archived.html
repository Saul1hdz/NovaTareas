<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tareas Archivadas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #b7c7a4;
        }
        .container {
            max-width: 700px;
            margin: 40px auto;
            background: #eaf6f6;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            padding: 32px 36px 24px 36px;
        }
        h1 {
            margin-top: 0;
            color: #6b4f8a;
        }
        .archived-task {
            background: #f7e9e9;
            border-radius: 10px;
            margin-bottom: 18px;
            padding: 18px 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .archived-task strong {
            font-size: 1.1em;
        }
        .archived-task em {
            color: #888;
        }
        .archived-task pre {
            background: #fffbe6;
            border-radius: 6px;
            padding: 10px;
            margin: 8px 0 0 0;
            font-size: 1em;
        }
        .no-tasks {
            color: #888;
            font-style: italic;
            margin: 32px 0;
        }
        .back-link {
            display: inline-block;
            margin-top: 18px;
            color: #6b4f8a;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tareas Terminadas</h1>
        {% for task in tasks %}
            <div class="archived-task">
                <strong>{{ task.title }}</strong> - <em>{{ task.status }}</em><br>
                <strong>Notas:</strong>
                <pre>{{ task.notes }}</pre>
            </div>
        {% else %}
            <div class="no-tasks">No hay tareas archivadas.</div>
        {% endfor %}
        <a class="back-link" href="/">&larr; Volver</a>
    </div>
</body>
</html>
